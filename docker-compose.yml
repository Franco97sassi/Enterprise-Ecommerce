services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enterprise_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: enterprise_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:latest
    container_name: enterprise_redis
    ports:
      - "6379:6379"

volumes:
  sqlserver_data: